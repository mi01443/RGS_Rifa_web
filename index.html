<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rifa Online</title>
  <link rel="stylesheet" href="css/style.css" />
  <!-- Firebase SDKs (compat v9) -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
  <a class="nav-logo" href="index.html">Rifa<span>Online</span></a>
  <div class="nav-links">
    <a href="index.html" class="active">Rifas</a>
    <a href="admin/login.html" class="btn-nav">Admin</a>
  </div>
</nav>

<!-- Conteúdo -->
<div class="container">
  <div style="margin-bottom: 24px;">
    <h1 class="syne" style="font-size: 26px; font-weight: 800; margin-bottom: 6px;">Rifas ativas 🎟️</h1>
    <p style="color: var(--text2); font-size: 14px;">Escolha uma rifa, selecione seus números e pague via PIX.</p>
  </div>

  <div id="loading" class="loading-center"><div class="spinner"></div></div>
  <div id="sem-rifas" style="display:none; text-align:center; padding: 60px 20px; color: var(--text3);">
    <div style="font-size: 48px; margin-bottom: 12px;">🎲</div>
    <p>Nenhuma rifa ativa no momento.</p>
  </div>

  <div class="rifas-grid" id="rifas-grid"></div>
</div>

<script src="js/firebase-config.js"></script>
<script src="js/utils.js"></script>
<script>
  async function carregarRifas() {
    try {
      const snap = await rifasCol()
        .where('ativa', '==', true)
        .orderBy('criadoEm', 'desc')
        .get();

      document.getElementById('loading').style.display = 'none';
      const grid = document.getElementById('rifas-grid');

      if (snap.empty) {
        document.getElementById('sem-rifas').style.display = 'block';
        return;
      }

      snap.forEach(doc => {
        const r = doc.data();
        const pct = Math.round((r.totalVendidos || 0) / r.totalNumeros * 100);
        grid.innerHTML += `
          <a class="rifa-card" href="rifa.html?id=${doc.id}">
            <div class="rifa-card-img">${r.emoji || '🎁'}</div>
            <div class="rifa-card-body">
              <div class="rifa-card-title">${r.nome}</div>
              <div class="rifa-card-desc">${r.descricao}</div>
              <div class="progress-bar" style="margin-bottom:10px">
                <div class="progress-fill" style="width:${pct}%"></div>
              </div>
              <div class="rifa-card-footer">
                <div class="rifa-card-price">${formatBRL(r.valorPorNumero)} <small>/ número</small></div>
                <div>
                  <span class="badge badge-gold">${r.totalNumeros - (r.totalVendidos||0)} disponíveis</span>
                </div>
              </div>
            </div>
          </a>
        `;
      });
    } catch (e) {
      console.error(e);
      document.getElementById('loading').style.display = 'none';
      showToast('Erro ao carregar rifas.', 'error');
    }
  }

  carregarRifas();
</script>
</body>
</html>
