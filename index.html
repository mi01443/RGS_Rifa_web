<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gerenciamento de Rifa</title>
    <style>
        :root {
            --primary: #27ae60;
            --secondary: #2c3e50;
            --selected: #f1c40f;
            --sold: #c0392b;
            --bg: #f0f2f5;
        }

        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        
        /* Painel Admin */
        #admin-panel { background: #f9f9f9; border: 2px solid #ddd; padding: 20px; border-radius: 8px; margin-bottom: 25px; display: none; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        
        /* Layout Principal */
        .header-rifa { text-align: center; border-bottom: 2px solid #eee; margin-bottom: 20px; padding-bottom: 20px; }
        .item-img { max-width: 100%; max-height: 350px; border-radius: 8px; display: block; margin: 15px auto; }
        
        /* Interface Estilo Cinema */
        .cinema-area { background: #222; padding: 30px 10px; border-radius: 10px; text-align: center; color: white; }
        .screen { width: 70%; height: 5px; background: #555; margin: 0 auto 40px; border-radius: 10px; box-shadow: 0 10px 20px rgba(255,255,255,0.1); }
        .grid-numbers { display: grid; grid-template-columns: repeat(auto-fill, minmax(40px, 1fr)); gap: 8px; max-width: 600px; margin: auto; }
        .number { 
            width: 40px; height: 40px; line-height: 40px; background: #444; cursor: pointer; 
            border-radius: 5px 5px 0 0; font-size: 12px; transition: 0.2s; border-bottom: 3px solid #111;
        }
        .number:hover { background: #666; }
        .number.selected { background: var(--selected); color: black; border-bottom-color: #b7950b; }
        .number.sold { background: var(--sold); cursor: not-allowed; opacity: 0.5; }

        /* Checkout Estático */
        #checkout { 
            position: sticky; bottom: 0; background: #fff; padding: 20px; 
            box-shadow: 0 -5px 15px rgba(0,0,0,0.1); display: none; border-radius: 10px 10px 0 0; 
            text-align: center; margin-top: 20px;
        }
        
        .btn { padding: 12px 25px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-buy { background: var(--primary); color: white; width: 100%; max-width: 300px; font-size: 18px; }
        .btn-admin { background: var(--secondary); color: white; margin-bottom: 15px; }

        .pix-result { background: #e8f6ef; border: 2px dashed var(--primary); padding: 20px; border-radius: 8px; margin-top: 20px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <button class="btn btn-admin" onclick="acessarAdmin()">⚙️ Gerenciar Evento</button>

    <!-- PAINEL ADMINISTRATIVO -->
    <div id="admin-panel">
        <h3>Configurações da Rifa</h3>
        <div class="form-group"><label>Item do Sorteio:</label><input type="text" id="adm-titulo"></div>
        <div class="form-group"><label>Descrição:</label><textarea id="adm-desc"></textarea></div>
        <div class="form-group"><label>Preço por Número (R$):</label><input type="number" id="adm-preco" step="0.01"></div>
        <div class="form-group"><label>Data do Sorteio:</label><input type="date" id="adm-data"></div>
        <div class="form-group"><label>URL da Imagem:</label><input type="text" id="adm-img"></div>
        <div class="form-group"><label>Chave PIX:</label><input type="text" id="adm-pix"></div>
        <button class="btn btn-buy" onclick="salvarConfig()">Publicar Sorteio</button>
        <button class="btn" style="background:#ccc" onclick="document.getElementById('admin-panel').style.display='none'">Fechar</button>
    </div>

    <!-- TELA PRINCIPAL -->
    <div id="rifa-content">
        <div class="header-rifa">
            <h1 id="v-titulo">Carregando rifa...</h1>
            <p id="v-desc">Configure o evento no painel admin.</p>
            <img id="v-img" src="" class="item-img" style="display:none">
            <p><strong>Sorteio em:</strong> <span id="v-data">--/--/--</span> | <strong>Valor:</strong> R$ <span id="v-preco">0,00</span></p>
        </div>

        <div class="cinema-area">
            <div class="screen">TELA DO SORTEIO</div>
            <div class="grid-numbers" id="grid"></div>
        </div>
    </div>

    <!-- CHECKOUT -->
    <div id="checkout">
        <h3>Itens Selecionados: <span id="cart-count">0</span></h3>
        <p style="font-size: 20px;">Total: <strong>R$ <span id="cart-total">0,00</span></strong></p>
        <div class="form-group" style="max-width: 400px; margin: auto;">
            <input type="text" id="user-nome" placeholder="Seu Nome Completo" style="margin-bottom: 10px;">
            <input type="tel" id="user-tel" placeholder="Seu WhatsApp (DDD + Número)">
        </div>
        <br>
        <button class="btn btn-buy" onclick="finalizarCompra()">FINALIZAR E PAGAR</button>
    </div>

    <!-- AREA PIX -->
    <div id="pix-area" class="pix-result">
        <h3>Pagamento via PIX</h3>
        <p>Chave: <strong id="pix-chave">---</strong></p>
        <div id="qrcode">
            <img id="img-qr" src="" alt="QR Code">
        </div>
        <p><small>Pague o valor exato e envie o comprovante via WhatsApp.</small></p>
    </div>
</div>

<script>
    const SENHA_MESTRA = "1234"; // Defina sua senha aqui
    let selecionados = [];
    let precoUnidade = 0;

    window.onload = () => {
        carregarApp();
        gerarGrid();
    };

    function acessarAdmin() {
        if (prompt("Digite a senha do administrador:") === SENHA_MESTRA) {
            document.getElementById('admin-panel').style.display = 'block';
            document.getElementById('admin-panel').scrollIntoView();
        } else {
            alert("Senha incorreta!");
        }
    }

    function salvarConfig() {
        const config = {
            titulo: document.getElementById('adm-titulo').value,
            desc: document.getElementById('adm-desc').value,
            preco: document.getElementById('adm-preco').value,
            data: document.getElementById('adm-data').value,
            img: document.getElementById('adm-img').value,
            pix: document.getElementById('adm-pix').value
        };
        localStorage.setItem('rifaConfig', JSON.stringify(config));
        alert("Rifa atualizada com sucesso!");
        location.reload();
    }

    function carregarApp() {
        const dados = JSON.parse(localStorage.getItem('rifaConfig'));
        if (dados) {
            document.getElementById('v-titulo').innerText = dados.titulo;
            document.getElementById('v-desc').innerText = dados.desc;
            document.getElementById('v-preco').innerText = parseFloat(dados.preco).toFixed(2);
            document.getElementById('v-data').innerText = dados.data;
            document.getElementById('pix-chave').innerText = dados.pix;
            precoUnidade = parseFloat(dados.preco);
            if (dados.img) {
                document.getElementById('v-img').src = dados.img;
                document.getElementById('v-img').style.display = 'block';
            }
        }
    }

    function gerarGrid() {
        const grid = document.getElementById('grid');
        for (let i = 1; i <= 100; i++) {
            const cadeira = document.createElement('div');
            cadeira.className = 'number';
            cadeira.innerText = i.toString().padStart(2, '0');
            cadeira.onclick = () => clicarNumero(cadeira, i);
            grid.appendChild(cadeira);
        }
    }

    function clicarNumero(el, num) {
        if (el.classList.contains('selected')) {
            el.classList.remove('selected');
            selecionados = selecionados.filter(n => n !== num);
        } else {
            el.classList.add('selected');
            selecionados.push(num);
        }
        atualizarCheckout();
    }

    function atualizarCheckout() {
        const check = document.getElementById('checkout');
        if (selecionados.length > 0) {
            check.style.display = 'block';
            document.getElementById('cart-count').innerText = selecionados.length;
            document.getElementById('cart-total').innerText = (selecionados.length * precoUnidade).toFixed(2);
        } else {
            check.style.display = 'none';
        }
    }

    function finalizarCompra() {
        const nome = document.getElementById('user-nome').value;
        const tel = document.getElementById('user-tel').value;
        const pix = document.getElementById('pix-chave').innerText;

        if (!nome || !tel) {
            return alert("Preencha seus dados para continuar.");
        }

        const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(pix)}`;
        document.getElementById('img-qr').src = qrUrl;
        document.getElementById('pix-area').style.display = 'block';
        document.getElementById('pix-area').scrollIntoView({ behavior: 'smooth' });

        alert(`Sucesso! Números ${selecionados.join(', ')} reservados para ${nome}.`);
    }
</script>

</body>
</html>
