<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin – Rifa Online</title>
  <link rel="stylesheet" href="../css/style.css" />
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
</head>
<body>

<div class="login-wrap">
  <div class="login-box">
    <div class="login-logo">Rifa<span>Online</span></div>
    <div class="login-sub">Painel Administrativo</div>

    <div class="card">
      <div id="alert-area"></div>

      <div class="form-group">
        <label class="form-label">E-mail</label>
        <input class="form-control" id="email" type="email" placeholder="admin@email.com" />
      </div>
      <div class="form-group">
        <label class="form-label">Senha</label>
        <input class="form-control" id="senha" type="password" placeholder="••••••••" />
      </div>

      <button class="btn btn-primary" id="btn-login" onclick="fazerLogin()">
        Entrar no painel
      </button>

      <div style="text-align:center; margin-top:16px">
        <a href="../index.html" style="font-size:13px; color:var(--text2); text-decoration:none">
          ← Voltar para as rifas
        </a>
      </div>
    </div>

    <p style="font-size:11px; color:var(--text3); text-align:center; margin-top:16px; line-height:1.6">
      Acesso restrito aos organizadores.<br>
      Cadastre o e-mail no Firebase Authentication.
    </p>
  </div>
</div>

<script src="../js/firebase-config.js"></script>
<script src="../js/utils.js"></script>
<script>
  // Redireciona se já logado
  auth.onAuthStateChanged(user => {
    if (user) window.location = 'dashboard.html';
  });

  async function fazerLogin() {
    const email = document.getElementById('email').value.trim();
    const senha = document.getElementById('senha').value;
    const btn   = document.getElementById('btn-login');
    const alert = document.getElementById('alert-area');

    if (!email || !senha) {
      alert.innerHTML = '<div class="alert alert-error">Preencha e-mail e senha.</div>';
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<div class="spinner"></div>';
    alert.innerHTML = '';

    try {
      await auth.signInWithEmailAndPassword(email, senha);
      window.location = 'dashboard.html';
    } catch (e) {
      const msgs = {
        'auth/user-not-found':  'Usuário não encontrado.',
        'auth/wrong-password':  'Senha incorreta.',
        'auth/invalid-email':   'E-mail inválido.',
        'auth/too-many-requests': 'Muitas tentativas. Aguarde e tente novamente.',
      };
      alert.innerHTML = `<div class="alert alert-error">${msgs[e.code] || 'Erro ao fazer login.'}</div>`;
      btn.disabled = false;
      btn.textContent = 'Entrar no painel';
    }
  }

  // Enter para logar
  document.addEventListener('keydown', e => { if (e.key === 'Enter') fazerLogin(); });
</script>
</body>
</html>
